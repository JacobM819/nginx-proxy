events {
  worker_connections 1024;
}

http {
  server {
      listen 80;
      server_name ai.jacobs-lab.dev;
      
      location / {
          resolver 127.0.0.11 valid=30s;
          set $upstream_webui http://open-webui:8083;
          proxy_pass $upstream_webui;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;

	  # For websockets, to allow text streaming
	  proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
      }
  }

  server {
      listen 80;
      server_name jacobs-lab.dev;

      location / {
          proxy_pass http://valentine:8081;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
      }
  }

  server {
      listen 80;
      server_name jacobmeyer.me;

      location / {
          proxy_pass http://portfolio-site:8080;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
      }
  }
}
